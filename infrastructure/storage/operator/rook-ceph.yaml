---
apiVersion: v1
kind: Namespace
metadata:
  name: rook-ceph
  labels:
    kubernetes.io/metadata.name: rook-ceph

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph
  namespace: rook-ceph
spec:
  interval: 30m
  chart:
    spec:
      chart: rook-ceph
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: rook-release
        namespace: flux-system
      version: "v1.17.7"
  values:
    resources:
