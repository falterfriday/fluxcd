apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mealie
  namespace: mealie
spec:
  interval: 30m
  chart:
    spec:
      chart: mealie
      sourceRef:
        kind: HelmRepository
        name: trueforge
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
    - kind: Secret
      name: mealie-db-secret
      valuesKey: password
      targetPath: cnpg.main.password
  values:
    ingress:
      main:
        enabled: true
        ingressClassName: nginx
        annotations:
          cert-manager.io/cluster-issuer: cloudflare-cluster-issuer
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
          nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
        hosts:
          - host: mealie.staging.stplabs.io
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - mealie.staging.stplabs.io
            secretName: mealie-tls
    persistence:
      data:
        enabled: true
        storageClass: ceph-block
    cnpg:
      main: {}
    metrics:
      main:
        enabled: true
        type: servicemonitor
